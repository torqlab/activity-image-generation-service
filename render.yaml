services:
  - type: web
    name: activity-image-generation-service
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: oregon
    plan: starter
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3002
      - key: ORIGIN
        sync: false  # Set this in the Render dashboard (e.g. https://your-frontend.onrender.com)
      - key: POLLINATIONS_API_KEY
        sync: false  # Set this as a secret in the Render dashboard
