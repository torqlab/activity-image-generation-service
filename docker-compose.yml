version: '3.8'

services:
  activity-image-generation-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
      PORT: 3002
      ORIGIN: http://localhost:3001
      POLLINATIONS_API_KEY: ${POLLINATIONS_API_KEY:-test-key}
    volumes:
      - ./src:/app/src
      - ./dist:/app/dist
    restart: unless-stopped
    networks:
      - torq

networks:
  torq:
    driver: bridge
